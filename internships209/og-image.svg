<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A5C"/>
      <stop offset="100%" style="stop-color:#1A56A4"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid decoration -->
  <rect x="0" y="0" width="1200" height="630" fill="none"
        stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80"  r="160" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1100" cy="80"  r="100" fill="rgba(255,255,255,0.04)"/>
  <circle cx="100"  cy="560" r="120" fill="rgba(255,255,255,0.04)"/>

  <!-- Main card -->
  <rect x="80" y="100" width="760" height="430" rx="20" fill="url(#card)"
        stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- 209 badge -->
  <rect x="120" y="148" width="110" height="48" rx="10" fill="#2563EB"/>
  <text x="175" y="183" font-family="Arial Black, Arial, sans-serif" font-size="28"
        font-weight="900" fill="white" text-anchor="middle">209</text>

  <!-- Site name -->
  <text x="248" y="183" font-family="Arial, sans-serif" font-size="28"
        font-weight="700" fill="white">Internships</text>

  <!-- Divider -->
  <line x1="120" y1="220" x2="720" y2="220" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Headline -->
  <text x="120" y="290" font-family="Arial Black, Arial, sans-serif" font-size="48"
        font-weight="900" fill="white">Find Your First</text>
  <text x="120" y="350" font-family="Arial Black, Arial, sans-serif" font-size="48"
        font-weight="900" fill="white">Opportunity in the</text>
  <text x="120" y="410" font-family="Arial Black, Arial, sans-serif" font-size="52"
        font-weight="900" fill="#60A5FA">Central Valley.</text>

  <!-- Subtext -->
  <text x="120" y="470" font-family="Arial, sans-serif" font-size="22"
        font-weight="400" fill="rgba(255,255,255,0.75)">Free internship listings for 209-area students.</text>

  <!-- Stats strip -->
  <rect x="80" y="556" width="760" height="56" rx="0 0 20 20" fill="rgba(0,0,0,0.25)"/>

  <!-- Stat items -->
  <text x="200" y="592" font-family="Arial, sans-serif" font-size="22" font-weight="700"
        fill="white" text-anchor="middle">12 Active Listings</text>
  <line x1="320" y1="566" x2="320" y2="602" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="500" y="592" font-family="Arial, sans-serif" font-size="22" font-weight="700"
        fill="white" text-anchor="middle">3 Counties Covered</text>
  <line x1="680" y1="566" x2="680" y2="602" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="760" y="592" font-family="Arial, sans-serif" font-size="22" font-weight="700"
        fill="#4ADE80" text-anchor="middle">100% Free</text>

  <!-- URL label -->
  <text x="1120" y="590" font-family="Arial, sans-serif" font-size="20" font-weight="600"
        fill="rgba(255,255,255,0.5)" text-anchor="end">internships209.com</text>
</svg>
